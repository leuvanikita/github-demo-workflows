name: Docker Build and Push

on:
    # workflow_call:
    # workflow_dispatch:
    push:
        branches: [main]

env:
    IMAGE_TAG: latest
    REPO_NAME: ${{ github.event.repository.name }}


jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USER }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push to Docker
              uses: docker/build-push-action@v6
              with:
                  context: . 
                  push: true
                  tags: |
                      ${{ vars.DOCKERHUB_USER }}/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}
                      ${{ vars.DOCKERHUB_USER }}/${{ env.REPO_NAME }}:${{ github.ref_name }}
                      ${{ vars.DOCKERHUB_USER }}/${{ env.REPO_NAME }}:${{ github.sha }}
